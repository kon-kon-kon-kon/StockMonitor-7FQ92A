<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>株価下落銘柄一覧</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #f4f6f8;
            color: #222222;
            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                "Yu Gothic",
                "Meiryo",
                sans-serif;
        }

        .container {
            width: 100%;
            max-width: 1500px;
            margin: 0 auto;
        }

        h1 {
            margin: 0 0 15px;
            font-size: 26px;
        }

        #count {
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        #message {
            display: none;
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            background-color: #ffffff;
            text-align: center;
            font-size: 17px;
        }

        #error-message {
            display: none;
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #d1242f;
            border-radius: 8px;
            background-color: #fff1f0;
            color: #d1242f;
            white-space: pre-wrap;
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            background-color: #ffffff;
        }

        table {
            width: 100%;
            min-width: 1100px;
            border-collapse: collapse;
        }

        thead {
            background-color: #1f6f43;
            color: #ffffff;
        }

        th,
        td {
            padding: 11px 10px;
            border-bottom: 1px solid #d8dee4;
            text-align: right;
            white-space: nowrap;
        }

        th {
            font-size: 14px;
        }

        td {
            font-size: 14px;
        }

        th:nth-child(2),
        td:nth-child(2),
        th:nth-child(3),
        td:nth-child(3) {
            text-align: left;
        }

        tbody tr:hover {
            background-color: #f3f8f5;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .negative {
            color: #d1242f;
            font-weight: bold;
        }

        .positive {
            color: #0969da;
            font-weight: bold;
        }

        .company-name {
            min-width: 260px;
            white-space: normal;
        }

        .loading {
            padding: 30px;
            text-align: center;
        }

        @media (max-width: 700px) {
            body {
                padding: 10px;
            }

            h1 {
                font-size: 21px;
            }

            #count {
                font-size: 16px;
            }

            th,
            td {
                padding: 9px 8px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <h1>株価下落銘柄一覧</h1>

        <div id="count">
            該当件数：読み込み中
        </div>

        <div id="error-message"></div>

        <div id="message">
            該当する銘柄はありません。
        </div>

        <div class="table-wrapper" id="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>順位</th>
                        <th>コード</th>
                        <th>銘柄名</th>
                        <th>現在値</th>
                        <th>前日比</th>
                        <th>前日比率</th>
                        <th>売買代金</th>
                        <th>前日終値</th>
                        <th>-10％価格</th>
                        <th>-12％価格</th>
                        <th>-14％価格</th>
                    </tr>
                </thead>

                <tbody id="stock-table-body">
                    <tr>
                        <td colspan="11" class="loading">
                            データを読み込んでいます。
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script>
        "use strict";

        const DATA_FILE = "./data.json";
        const REFRESH_INTERVAL = 60 * 1000;

        const countElement =
            document.getElementById("count");

        const messageElement =
            document.getElementById("message");

        const errorElement =
            document.getElementById("error-message");

        const tableWrapperElement =
            document.getElementById("table-wrapper");

        const tableBodyElement =
            document.getElementById("stock-table-body");


        /**
         * HTMLに特殊文字が含まれていても、
         * HTMLとして実行されないように変換する。
         */
        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }


        /**
         * 数値をカンマ区切りにする。
         */
        function formatNumber(value, maximumFractionDigits = 2) {
            if (
                value === null ||
                value === undefined ||
                value === ""
            ) {
                return "-";
            }

            const number = Number(
                String(value).replaceAll(",", "")
            );

            if (!Number.isFinite(number)) {
                return escapeHtml(value);
            }

            return number.toLocaleString("ja-JP", {
                maximumFractionDigits:
                    maximumFractionDigits
            });
        }


        /**
         * 前日比を表示する。
         */
        function formatDiffYen(stock) {
            const rawValue =
                stock.diff_yen_num ??
                stock.diff_yen;

            if (
                rawValue === null ||
                rawValue === undefined ||
                rawValue === ""
            ) {
                return "-";
            }

            const number = Number(
                String(rawValue)
                    .replaceAll(",", "")
                    .replace("+", "")
            );

            if (!Number.isFinite(number)) {
                return escapeHtml(rawValue);
            }

            const sign = number > 0 ? "+" : "";

            return (
                sign +
                number.toLocaleString("ja-JP", {
                    maximumFractionDigits: 2
                })
            );
        }


        /**
         * 前日比率を表示する。
         */
        function formatDiffPercent(stock) {
            const rawValue =
                stock.diff_percent_num ??
                stock.diff_percent;

            if (
                rawValue === null ||
                rawValue === undefined ||
                rawValue === ""
            ) {
                return "-";
            }

            const number = Number(
                String(rawValue)
                    .replace("%", "")
                    .replace("+", "")
            );

            if (!Number.isFinite(number)) {
                return escapeHtml(rawValue);
            }

            const sign = number > 0 ? "+" : "";

            return `${sign}${number.toFixed(2)}%`;
        }


        /**
         * 前日比に応じたCSSクラスを返す。
         */
        function getDiffClass(stock) {
            const rawValue =
                stock.diff_percent_num ??
                stock.diff_percent ??
                0;

            const number = Number(
                String(rawValue)
                    .replace("%", "")
                    .replace("+", "")
            );

            if (number < 0) {
                return "negative";
            }

            if (number > 0) {
                return "positive";
            }

            return "";
        }


        /**
         * 下落率が大きい順に並べ替える。
         * 例：
         * -12％
         * -10％
         * -6％
         */
        function sortStocks(stocks) {
            return [...stocks].sort((a, b) => {
                const aPercent = Number(
                    a.diff_percent_num ??
                    String(a.diff_percent ?? 0)
                        .replace("%", "")
                        .replace("+", "")
                );

                const bPercent = Number(
                    b.diff_percent_num ??
                    String(b.diff_percent ?? 0)
                        .replace("%", "")
                        .replace("+", "")
                );

                return aPercent - bPercent;
            });
        }


        /**
         * 最新のスナップショットを取得する。
         *
         * 過去のtargetsは統合しない。
         * snapshots配列の一番最後だけを使用する。
         */
        function getLatestSnapshot(data) {
            const snapshots =
                Array.isArray(data.snapshots)
                    ? data.snapshots
                    : [];

            if (snapshots.length === 0) {
                return null;
            }

            return snapshots[snapshots.length - 1];
        }


        /**
         * 株価一覧を画面に表示する。
         */
        function renderStocks(stocks) {
            tableBodyElement.innerHTML = "";

            countElement.textContent =
                `該当件数：${stocks.length}件`;

            if (stocks.length === 0) {
                tableWrapperElement.style.display =
                    "none";

                messageElement.style.display =
                    "block";

                return;
            }

            tableWrapperElement.style.display =
                "block";

            messageElement.style.display =
                "none";

            const sortedStocks =
                sortStocks(stocks);

            for (const stock of sortedStocks) {
                const diffClass =
                    getDiffClass(stock);

                const row =
                    document.createElement("tr");

                row.innerHTML = `
                    <td>
                        ${formatNumber(stock.rank, 0)}
                    </td>

                    <td>
                        ${escapeHtml(stock.code)}
                    </td>

                    <td class="company-name">
                        ${escapeHtml(stock.company)}
                    </td>

                    <td>
                        ${formatNumber(
                            stock.price_num ??
                            stock.price
                        )}
                    </td>

                    <td class="${diffClass}">
                        ${formatDiffYen(stock)}
                    </td>

                    <td class="${diffClass}">
                        ${formatDiffPercent(stock)}
                    </td>

                    <td>
                        ${formatNumber(
                            stock.trading_value,
                            0
                        )}
                    </td>

                    <td>
                        ${formatNumber(
                            stock.previous_close
                        )}
                    </td>

                    <td>
                        ${formatNumber(
                            stock.price_10
                        )}
                    </td>

                    <td>
                        ${formatNumber(
                            stock.price_12
                        )}
                    </td>

                    <td>
                        ${formatNumber(
                            stock.price_14
                        )}
                    </td>
                `;

                tableBodyElement.appendChild(row);
            }
        }


        /**
         * data.jsonを読み込む。
         */
        async function loadData() {
            errorElement.style.display =
                "none";

            try {
                /*
                 * URL末尾に現在時刻を付けることで、
                 * 古いdata.jsonのキャッシュ利用を防ぐ。
                 */
                const requestUrl =
                    `${DATA_FILE}?timestamp=${Date.now()}`;

                const response = await fetch(
                    requestUrl,
                    {
                        method: "GET",
                        cache: "no-store"
                    }
                );

                if (!response.ok) {
                    throw new Error(
                        `data.jsonの取得に失敗しました。` +
                        ` HTTPステータス：${response.status}`
                    );
                }

                const data =
                    await response.json();

                const latestSnapshot =
                    getLatestSnapshot(data);

                if (!latestSnapshot) {
                    renderStocks([]);
                    return;
                }

                const latestTargets =
                    Array.isArray(
                        latestSnapshot.targets
                    )
                        ? latestSnapshot.targets
                        : [];

                /*
                 * ここではlatestSnapshotだけを使用する。
                 * 過去のsnapshot.targetsは一切統合しない。
                 */
                renderStocks(latestTargets);

            } catch (error) {
                console.error(error);

                countElement.textContent =
                    "該当件数：取得失敗";

                tableWrapperElement.style.display =
                    "none";

                messageElement.style.display =
                    "none";

                errorElement.style.display =
                    "block";

                errorElement.textContent =
                    "データの読み込み中にエラーが発生しました。\n" +
                    String(error.message ?? error);
            }
        }


        /*
         * ページを開いた直後に読み込む。
         */
        loadData();


        /*
         * 60秒ごとに最新データを読み直す。
         */
        setInterval(
            loadData,
            REFRESH_INTERVAL
        );
    </script>
</body>
</html>
