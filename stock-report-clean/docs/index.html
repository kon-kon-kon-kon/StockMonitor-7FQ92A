<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>株価下落銘柄一覧</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      background: #f4f6f8;
      color: #1f2328;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Yu Gothic", "Meiryo", sans-serif;
    }

    .container {
      width: 100%;
      max-width: 1500px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 26px;
    }

    #count {
      margin-bottom: 14px;
      font-size: 18px;
      font-weight: 700;
    }

    #status-message,
    #error-message {
      display: none;
      margin: 18px 0;
      padding: 18px;
      border-radius: 8px;
      background: #ffffff;
      text-align: center;
    }

    #status-message {
      border: 1px solid #d0d7de;
    }

    #error-message {
      border: 1px solid #cf222e;
      background: #fff1f0;
      color: #cf222e;
      white-space: pre-wrap;
      text-align: left;
    }

    .table-wrapper {
      width: 100%;
      overflow-x: auto;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      background: #ffffff;
    }

    table {
      width: 100%;
      min-width: 1080px;
      border-collapse: collapse;
    }

    thead {
      background: #176b3a;
      color: #ffffff;
    }

    th,
    td {
      padding: 11px 10px;
      border-bottom: 1px solid #d8dee4;
      text-align: right;
      white-space: nowrap;
    }

    th:nth-child(2),
    td:nth-child(2),
    th:nth-child(3),
    td:nth-child(3) {
      text-align: left;
    }

    .company {
      min-width: 260px;
      white-space: normal;
    }

    .negative {
      color: #cf222e;
      font-weight: 700;
    }

    tbody tr:hover {
      background: #f3f8f5;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    @media (max-width: 700px) {
      body {
        padding: 10px;
      }

      h1 {
        font-size: 21px;
      }

      #count {
        font-size: 16px;
      }

      th,
      td {
        padding: 9px 8px;
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>株価下落銘柄一覧</h1>

    <div id="count">該当件数：読み込み中</div>
    <div id="status-message">該当する銘柄はありません。</div>
    <div id="error-message"></div>

    <div id="table-wrapper" class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>順位</th>
            <th>コード</th>
            <th>銘柄名</th>
            <th>現在値</th>
            <th>前日比</th>
            <th>下落率</th>
            <th>前日終値</th>
            <th>-10％価格</th>
            <th>-12％価格</th>
            <th>-14％価格</th>
            <th>売買代金</th>
          </tr>
        </thead>
        <tbody id="stock-body"></tbody>
      </table>
    </div>
  </main>

  <script>
    "use strict";

    const DATA_URL = "./data.json";
    const REFRESH_INTERVAL_MS = 60 * 1000;

    const countElement = document.getElementById("count");
    const statusElement = document.getElementById("status-message");
    const errorElement = document.getElementById("error-message");
    const tableWrapper = document.getElementById("table-wrapper");
    const stockBody = document.getElementById("stock-body");

    function toNumber(value) {
      const number = Number(value);
      return Number.isFinite(number) ? number : null;
    }

    function formatNumber(value, maximumFractionDigits = 2) {
      const number = toNumber(value);
      if (number === null) {
        return "-";
      }

      return number.toLocaleString("ja-JP", {
        maximumFractionDigits
      });
    }

    function formatSignedNumber(value) {
      const number = toNumber(value);
      if (number === null) {
        return "-";
      }

      const sign = number > 0 ? "+" : "";
      return `${sign}${formatNumber(number)}`;
    }

    function formatPercent(value) {
      const number = toNumber(value);
      if (number === null) {
        return "-";
      }

      const sign = number > 0 ? "+" : "";
      return `${sign}${number.toFixed(2)}%`;
    }

    function appendCell(row, text, className = "") {
      const cell = document.createElement("td");
      cell.textContent = text;
      if (className) {
        cell.className = className;
      }
      row.appendChild(cell);
    }

    function render(stocks) {
      stockBody.replaceChildren();
      countElement.textContent = `該当件数：${stocks.length}件`;
      errorElement.style.display = "none";

      if (stocks.length === 0) {
        tableWrapper.style.display = "none";
        statusElement.style.display = "block";
        return;
      }

      tableWrapper.style.display = "block";
      statusElement.style.display = "none";

      for (const stock of stocks) {
        const row = document.createElement("tr");

        appendCell(row, formatNumber(stock.rank, 0));
        appendCell(row, String(stock.code ?? ""));
        appendCell(row, String(stock.company ?? ""), "company");
        appendCell(row, formatNumber(stock.price));
        appendCell(row, formatSignedNumber(stock.diff_yen), "negative");
        appendCell(row, formatPercent(stock.diff_percent), "negative");
        appendCell(row, formatNumber(stock.previous_close));
        appendCell(row, formatNumber(stock.price_10));
        appendCell(row, formatNumber(stock.price_12));
        appendCell(row, formatNumber(stock.price_14));
        appendCell(row, formatNumber(stock.trading_value, 0));

        stockBody.appendChild(row);
      }
    }

    function showError(error) {
      countElement.textContent = "該当件数：取得失敗";
      statusElement.style.display = "none";
      tableWrapper.style.display = "none";
      errorElement.style.display = "block";
      errorElement.textContent =
        `データの読み込みに失敗しました。\n${error.message ?? error}`;
    }

    async function loadData() {
      try {
        const response = await fetch(
          `${DATA_URL}?timestamp=${Date.now()}`,
          {
            method: "GET",
            cache: "no-store"
          }
        );

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        const stocks = Array.isArray(data.stocks) ? data.stocks : [];

        stocks.sort((a, b) => {
          return Number(a.diff_percent) - Number(b.diff_percent);
        });

        render(stocks);
      } catch (error) {
        console.error(error);
        showError(error);
      }
    }

    loadData();
    setInterval(loadData, REFRESH_INTERVAL_MS);
  </script>
</body>
</html>
